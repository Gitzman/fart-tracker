<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <title>Fart Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --card: #0f3460;
      --accent: #e94560;
      --accent-glow: rgba(233, 69, 96, 0.4);
      --text: #eee;
      --text-dim: #8899aa;
      --green: #4ecca3;
      --yellow: #ffc107;
      --radius: 12px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }
    .container { max-width: 480px; margin: 0 auto; padding: 16px; }

    /* NAV TABS */
    .nav { display: flex; gap: 4px; margin-bottom: 16px; background: var(--surface); border-radius: var(--radius); padding: 4px; }
    .nav button {
      flex: 1; padding: 10px 4px; border: none; background: transparent;
      color: var(--text-dim); font-size: 13px; border-radius: 8px; cursor: pointer;
      transition: all 0.2s;
    }
    .nav button.active { background: var(--card); color: var(--text); font-weight: 600; }

    /* SECTIONS */
    .section { display: none; }
    .section.active { display: block; }

    /* BIG FART BUTTON */
    .fart-zone { text-align: center; padding: 24px 0; }
    .fart-btn {
      width: 180px; height: 180px; border-radius: 50%; border: none;
      background: radial-gradient(circle at 40% 40%, var(--accent), #b8304f);
      color: white; font-size: 48px; cursor: pointer;
      box-shadow: 0 0 40px var(--accent-glow);
      transition: transform 0.15s, box-shadow 0.15s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .fart-btn:active {
      transform: scale(0.93);
      box-shadow: 0 0 60px var(--accent-glow);
    }
    .fart-btn-label { display: block; font-size: 14px; margin-top: 4px; letter-spacing: 1px; }
    .fart-count { margin-top: 12px; font-size: 14px; color: var(--text-dim); }
    .fart-count span { color: var(--accent); font-weight: 700; font-size: 20px; }

    /* RECENT FEED */
    .recent-title { font-size: 14px; color: var(--text-dim); margin: 16px 0 8px; text-transform: uppercase; letter-spacing: 1px; }
    .recent-list { list-style: none; }
    .recent-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; background: var(--surface); border-radius: var(--radius);
      margin-bottom: 6px; font-size: 14px;
    }
    .recent-item .emoji { font-size: 22px; }
    .recent-item .meta { flex: 1; }
    .recent-item .time { color: var(--text-dim); font-size: 12px; }
    .recent-item .tags { font-size: 11px; color: var(--green); margin-top: 2px; }

    /* MODAL */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); z-index: 100;
      align-items: flex-end; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface); border-radius: 20px 20px 0 0;
      padding: 24px; width: 100%; max-width: 480px;
      max-height: 80vh; overflow-y: auto;
    }
    .modal h3 { margin-bottom: 16px; font-size: 18px; }
    .modal label { display: block; font-size: 13px; color: var(--text-dim); margin: 12px 0 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .option-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .option-btn {
      padding: 8px 14px; border: 2px solid var(--card); border-radius: 20px;
      background: transparent; color: var(--text); font-size: 13px;
      cursor: pointer; transition: all 0.2s;
    }
    .option-btn.selected { border-color: var(--accent); background: rgba(233,69,96,0.15); }
    .food-input {
      width: 100%; padding: 10px 14px; border: 2px solid var(--card);
      border-radius: var(--radius); background: var(--bg); color: var(--text);
      font-size: 14px; outline: none;
    }
    .food-input:focus { border-color: var(--accent); }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    .modal-actions button {
      flex: 1; padding: 14px; border: none; border-radius: var(--radius);
      font-size: 15px; font-weight: 600; cursor: pointer;
    }
    .btn-save { background: var(--accent); color: white; }
    .btn-skip { background: var(--card); color: var(--text); }

    /* FOOD DIARY */
    .food-add-row { display: flex; gap: 8px; margin-bottom: 16px; }
    .food-add-row input { flex: 1; padding: 10px 14px; border: 2px solid var(--card); border-radius: var(--radius); background: var(--bg); color: var(--text); font-size: 14px; outline: none; }
    .food-add-row input:focus { border-color: var(--green); }
    .food-add-row button {
      padding: 10px 18px; border: none; border-radius: var(--radius);
      background: var(--green); color: var(--bg); font-weight: 700; font-size: 16px; cursor: pointer;
    }
    .food-list { list-style: none; }
    .food-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; background: var(--surface); border-radius: var(--radius);
      margin-bottom: 6px; font-size: 14px;
    }
    .food-item .emoji { font-size: 20px; }
    .food-item .food-meta { flex: 1; }
    .food-item .food-time { color: var(--text-dim); font-size: 12px; }
    .food-item .correlation { font-size: 11px; color: var(--yellow); margin-top: 2px; }
    .food-item .delete-btn {
      background: none; border: none; color: var(--text-dim); font-size: 18px;
      cursor: pointer; padding: 4px;
    }

    /* STATS */
    .stat-card {
      background: var(--surface); border-radius: var(--radius);
      padding: 16px; margin-bottom: 12px;
    }
    .stat-card h4 { font-size: 14px; color: var(--text-dim); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-number { font-size: 36px; font-weight: 700; color: var(--accent); }
    .stat-label { font-size: 12px; color: var(--text-dim); }
    .chart-container { height: 200px; position: relative; }
    .heatmap { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; }
    .heatmap-cell {
      aspect-ratio: 1; border-radius: 6px; display: flex; align-items: center;
      justify-content: center; font-size: 10px; color: var(--text-dim);
    }
    .correlation-list { list-style: none; }
    .correlation-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 14px;
    }
    .correlation-bar {
      height: 6px; border-radius: 3px; background: var(--card); width: 100px; overflow: hidden;
    }
    .correlation-fill { height: 100%; border-radius: 3px; background: var(--yellow); }

    /* HISTORY */
    .filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .filter-select {
      padding: 8px 12px; border: 2px solid var(--card); border-radius: var(--radius);
      background: var(--bg); color: var(--text); font-size: 13px; outline: none;
    }
    .history-list { list-style: none; }
    .history-item {
      display: flex; align-items: center; gap: 10px;
      padding: 12px; background: var(--surface); border-radius: var(--radius);
      margin-bottom: 6px;
    }
    .history-item .emoji { font-size: 24px; }
    .history-item .h-meta { flex: 1; }
    .history-item .h-date { font-size: 12px; color: var(--text-dim); }
    .history-item .h-details { font-size: 13px; margin-top: 2px; }
    .history-item .h-food { font-size: 11px; color: var(--green); margin-top: 2px; }
    .history-empty { text-align: center; padding: 40px 0; color: var(--text-dim); }

    .no-data { text-align: center; padding: 30px 0; color: var(--text-dim); font-size: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="nav">
      <button class="active" data-tab="log">💨 Log</button>
      <button data-tab="food">🍔 Food</button>
      <button data-tab="stats">📊 Stats</button>
      <button data-tab="history">📜 History</button>
    </div>

    <!-- LOG TAB -->
    <div id="tab-log" class="section active">
      <div class="fart-zone">
        <button class="fart-btn" id="fartBtn">💨<span class="fart-btn-label">FART</span></button>
        <div class="fart-count">Today: <span id="todayCount">0</span></div>
      </div>
      <div class="recent-title">Recent Blasts 💨</div>
      <ul class="recent-list" id="recentList"></ul>
    </div>

    <!-- FOOD TAB -->
    <div id="tab-food" class="section">
      <div class="food-add-row">
        <input type="text" id="foodInput" placeholder="What did you eat? 🍕">
        <button id="addFoodBtn">+</button>
      </div>
      <div class="recent-title">Today's Eats 🍽️</div>
      <ul class="food-list" id="foodList"></ul>
    </div>

    <!-- STATS TAB -->
    <div id="tab-stats" class="section">
      <div class="stat-card">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <div class="stat-number" id="statTotal">0</div>
            <div class="stat-label">farts today</div>
          </div>
          <div style="text-align:right">
            <div class="stat-number" style="font-size:24px" id="statStreak">0</div>
            <div class="stat-label">day streak 🔥</div>
          </div>
        </div>
      </div>
      <div class="stat-card">
        <h4>📈 Daily Count (Last 7 Days)</h4>
        <div class="chart-container"><canvas id="dailyChart"></canvas></div>
      </div>
      <div class="stat-card">
        <h4>🕐 Peak Hours Heatmap</h4>
        <div class="heatmap" id="heatmap"></div>
      </div>
      <div class="stat-card">
        <h4>🍔 Food Correlations</h4>
        <div id="correlations"></div>
      </div>
    </div>

    <!-- HISTORY TAB -->
    <div id="tab-history" class="section">
      <div class="filters">
        <input type="date" class="filter-select" id="filterDate">
        <select class="filter-select" id="filterIntensity">
          <option value="">All Intensity</option>
          <option value="1">1 - Whisper</option>
          <option value="2">2 - Mild</option>
          <option value="3">3 - Medium</option>
          <option value="4">4 - Loud</option>
          <option value="5">5 - Deadly</option>
        </select>
        <select class="filter-select" id="filterFood">
          <option value="">All Foods</option>
        </select>
      </div>
      <ul class="history-list" id="historyList"></ul>
    </div>
  </div>

  <!-- METADATA MODAL -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h3>💨 Fart Details</h3>
      <label>Intensity</label>
      <div class="option-row" id="intensityRow">
        <button class="option-btn" data-val="1">1 😶</button>
        <button class="option-btn" data-val="2">2 😏</button>
        <button class="option-btn selected" data-val="3">3 😤</button>
        <button class="option-btn" data-val="4">4 🤯</button>
        <button class="option-btn" data-val="5">5 ☠️</button>
      </div>
      <label>Sound</label>
      <div class="option-row" id="soundRow">
        <button class="option-btn" data-val="silent">🤫 Silent</button>
        <button class="option-btn" data-val="squeaker">🐭 Squeaker</button>
        <button class="option-btn selected" data-val="rumbler">🌀 Rumbler</button>
        <button class="option-btn" data-val="thunderclap">⚡ Thunderclap</button>
      </div>
      <label>Duration</label>
      <div class="option-row" id="durationRow">
        <button class="option-btn" data-val="short">💨 Short</button>
        <button class="option-btn selected" data-val="medium">💨💨 Medium</button>
        <button class="option-btn" data-val="long">💨💨💨 Long</button>
      </div>
      <label>Food Blame</label>
      <input type="text" class="food-input" id="foodBlame" placeholder="What caused this? 🌮">
      <div class="modal-actions">
        <button class="btn-skip" id="modalSkip">Skip</button>
        <button class="btn-save" id="modalSave">Save 💾</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script>
    // ===== DATA LAYER =====
    const FARTS_KEY = 'farttracker_farts';
    const FOODS_KEY = 'farttracker_foods';

    function getFarts() {
      return JSON.parse(localStorage.getItem(FARTS_KEY) || '[]');
    }
    function saveFarts(farts) {
      localStorage.setItem(FARTS_KEY, JSON.stringify(farts));
    }
    function getFoods() {
      return JSON.parse(localStorage.getItem(FOODS_KEY) || '[]');
    }
    function saveFoods(foods) {
      localStorage.setItem(FOODS_KEY, JSON.stringify(foods));
    }

    function dateStr(d) {
      return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }
    function timeStr(d) {
      return new Date(d).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    }
    function fullDateStr(d) {
      return new Date(d).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
    }
    function isToday(d) {
      const t = new Date(), dd = new Date(d);
      return t.toDateString() === dd.toDateString();
    }
    function isoDate(d) {
      const dd = new Date(d);
      return dd.getFullYear() + '-' + String(dd.getMonth()+1).padStart(2,'0') + '-' + String(dd.getDate()).padStart(2,'0');
    }

    const SOUND_EMOJI = { silent: '🤫', squeaker: '🐭', rumbler: '🌀', thunderclap: '⚡' };
    const INTENSITY_EMOJI = ['', '😶', '😏', '😤', '🤯', '☠️'];

    // ===== NAVIGATION =====
    document.querySelectorAll('.nav button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
        if (btn.dataset.tab === 'stats') renderStats();
        if (btn.dataset.tab === 'history') renderHistory();
        if (btn.dataset.tab === 'food') renderFoodList();
      });
    });

    // ===== FART BUTTON =====
    let pendingFart = null;

    document.getElementById('fartBtn').addEventListener('click', () => {
      pendingFart = { timestamp: Date.now(), intensity: 3, sound: 'rumbler', duration: 'medium', food: '' };
      // Reset modal selections
      setSelected('intensityRow', '3');
      setSelected('soundRow', 'rumbler');
      setSelected('durationRow', 'medium');
      document.getElementById('foodBlame').value = '';
      document.getElementById('modalOverlay').classList.add('open');
    });

    function setSelected(rowId, val) {
      document.querySelectorAll('#' + rowId + ' .option-btn').forEach(b => {
        b.classList.toggle('selected', b.dataset.val === val);
      });
    }

    // Option buttons
    ['intensityRow', 'soundRow', 'durationRow'].forEach(rowId => {
      document.getElementById(rowId).addEventListener('click', e => {
        const btn = e.target.closest('.option-btn');
        if (!btn) return;
        setSelected(rowId, btn.dataset.val);
      });
    });

    function getSelected(rowId) {
      const s = document.querySelector('#' + rowId + ' .option-btn.selected');
      return s ? s.dataset.val : null;
    }

    document.getElementById('modalSave').addEventListener('click', () => {
      if (!pendingFart) return;
      pendingFart.intensity = parseInt(getSelected('intensityRow')) || 3;
      pendingFart.sound = getSelected('soundRow') || 'rumbler';
      pendingFart.duration = getSelected('durationRow') || 'medium';
      pendingFart.food = document.getElementById('foodBlame').value.trim();
      saveFart(pendingFart);
      document.getElementById('modalOverlay').classList.remove('open');
      pendingFart = null;
    });

    document.getElementById('modalSkip').addEventListener('click', () => {
      if (!pendingFart) return;
      saveFart(pendingFart);
      document.getElementById('modalOverlay').classList.remove('open');
      pendingFart = null;
    });

    document.getElementById('modalOverlay').addEventListener('click', e => {
      if (e.target === e.currentTarget) {
        if (pendingFart) saveFart(pendingFart);
        e.currentTarget.classList.remove('open');
        pendingFart = null;
      }
    });

    function saveFart(fart) {
      const farts = getFarts();
      farts.unshift(fart);
      saveFarts(farts);
      updateTodayCount();
      renderRecent();
    }

    // ===== TODAY COUNT =====
    function updateTodayCount() {
      const count = getFarts().filter(f => isToday(f.timestamp)).length;
      document.getElementById('todayCount').textContent = count;
    }

    // ===== RECENT FEED =====
    function renderRecent() {
      const list = document.getElementById('recentList');
      const farts = getFarts().slice(0, 10);
      if (!farts.length) {
        list.innerHTML = '<li class="no-data">No farts yet. Tap the button! 💨</li>';
        return;
      }
      list.innerHTML = farts.map(f => {
        const emoji = INTENSITY_EMOJI[f.intensity] || '💨';
        const sound = SOUND_EMOJI[f.sound] || '';
        const tags = [sound + ' ' + (f.sound || ''), f.duration || ''].filter(Boolean).join(' / ');
        const foodTag = f.food ? '<div class="tags">🍔 ' + escHtml(f.food) + '</div>' : '';
        return `<li class="recent-item">
          <span class="emoji">${emoji}</span>
          <div class="meta">
            <div class="time">${timeStr(f.timestamp)}</div>
            <div class="tags">${tags}</div>
            ${foodTag}
          </div>
        </li>`;
      }).join('');
    }

    function escHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    // ===== FOOD DIARY =====
    document.getElementById('addFoodBtn').addEventListener('click', addFood);
    document.getElementById('foodInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addFood();
    });

    function addFood() {
      const input = document.getElementById('foodInput');
      const name = input.value.trim();
      if (!name) return;
      const foods = getFoods();
      foods.unshift({ name, timestamp: Date.now() });
      saveFoods(foods);
      input.value = '';
      renderFoodList();
    }

    function renderFoodList() {
      const list = document.getElementById('foodList');
      const foods = getFoods().filter(f => isToday(f.timestamp));
      if (!foods.length) {
        list.innerHTML = '<li class="no-data">No food logged today. What did you eat? 🍕</li>';
        return;
      }
      const farts = getFarts();
      list.innerHTML = foods.map((f, i) => {
        const fartsAfter = farts.filter(fa => {
          const diff = (fa.timestamp - f.timestamp) / 3600000;
          return diff >= 2 && diff <= 8;
        }).length;
        const corrText = fartsAfter > 0 ? `<div class="correlation">💨 ${fartsAfter} fart${fartsAfter !== 1 ? 's' : ''} within 2-8hrs</div>` : '';
        return `<li class="food-item">
          <span class="emoji">🍽️</span>
          <div class="food-meta">
            <div>${escHtml(f.name)}</div>
            <div class="food-time">${timeStr(f.timestamp)}</div>
            ${corrText}
          </div>
          <button class="delete-btn" onclick="deleteFood(${i})">✕</button>
        </li>`;
      }).join('');
    }

    window.deleteFood = function(idx) {
      const foods = getFoods();
      const todayFoods = foods.filter(f => isToday(f.timestamp));
      const target = todayFoods[idx];
      if (!target) return;
      const realIdx = foods.indexOf(target);
      if (realIdx !== -1) {
        foods.splice(realIdx, 1);
        saveFoods(foods);
        renderFoodList();
      }
    };

    // ===== STATS =====
    let dailyChartInstance = null;

    function renderStats() {
      const farts = getFarts();
      const foods = getFoods();

      // Today count
      document.getElementById('statTotal').textContent = farts.filter(f => isToday(f.timestamp)).length;

      // Streak
      let streak = 0;
      const today = new Date();
      for (let i = 0; i < 365; i++) {
        const d = new Date(today);
        d.setDate(d.getDate() - i);
        const dayStr = d.toDateString();
        if (farts.some(f => new Date(f.timestamp).toDateString() === dayStr)) {
          streak++;
        } else {
          break;
        }
      }
      document.getElementById('statStreak').textContent = streak;

      // Daily chart (last 7 days)
      const labels = [];
      const data = [];
      for (let i = 6; i >= 0; i--) {
        const d = new Date();
        d.setDate(d.getDate() - i);
        labels.push(dateStr(d));
        const dayStr = d.toDateString();
        data.push(farts.filter(f => new Date(f.timestamp).toDateString() === dayStr).length);
      }

      if (dailyChartInstance) dailyChartInstance.destroy();
      const ctx = document.getElementById('dailyChart').getContext('2d');
      dailyChartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
          labels,
          datasets: [{
            data,
            backgroundColor: 'rgba(233, 69, 96, 0.6)',
            borderColor: 'var(--accent)',
            borderWidth: 1,
            borderRadius: 6,
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            y: { beginAtZero: true, ticks: { stepSize: 1, color: '#8899aa' }, grid: { color: 'rgba(255,255,255,0.05)' } },
            x: { ticks: { color: '#8899aa' }, grid: { display: false } }
          }
        }
      });

      // Heatmap (24h split into 4-hour blocks)
      const heatmap = document.getElementById('heatmap');
      const hourLabels = ['12-4am', '4-8am', '8am-12', '12-4pm', '4-8pm', '8pm-12'];
      const hourCounts = new Array(6).fill(0);
      farts.forEach(f => {
        const h = new Date(f.timestamp).getHours();
        hourCounts[Math.floor(h / 4)]++;
      });
      const maxH = Math.max(...hourCounts, 1);
      heatmap.innerHTML = hourCounts.map((c, i) => {
        const intensity = c / maxH;
        const bg = intensity === 0 ? 'var(--card)' :
          `rgba(233, 69, 96, ${0.2 + intensity * 0.8})`;
        return `<div class="heatmap-cell" style="background:${bg}">
          <div><div style="font-size:16px">${c}</div><div>${hourLabels[i]}</div></div>
        </div>`;
      }).join('');

      // Food correlations
      const corrDiv = document.getElementById('correlations');
      const foodMap = {};
      foods.forEach(food => {
        const name = food.name.toLowerCase();
        const fartsAfter = farts.filter(f => {
          const diff = (f.timestamp - food.timestamp) / 3600000;
          return diff >= 2 && diff <= 8;
        }).length;
        if (!foodMap[name]) foodMap[name] = { count: 0, farts: 0 };
        foodMap[name].count++;
        foodMap[name].farts += fartsAfter;
      });

      const corrItems = Object.entries(foodMap)
        .map(([name, d]) => ({ name, avg: d.farts / d.count, count: d.count }))
        .filter(d => d.count >= 1)
        .sort((a, b) => b.avg - a.avg)
        .slice(0, 8);

      if (!corrItems.length) {
        corrDiv.innerHTML = '<div class="no-data">Log food to see correlations 🔬</div>';
      } else {
        const maxAvg = Math.max(...corrItems.map(c => c.avg), 1);
        corrDiv.innerHTML = '<ul class="correlation-list">' + corrItems.map(c =>
          `<li class="correlation-item">
            <span>🍔 ${escHtml(c.name)} <span style="color:var(--text-dim);font-size:12px">(${c.count}x)</span></span>
            <div style="display:flex;align-items:center;gap:8px">
              <div class="correlation-bar"><div class="correlation-fill" style="width:${(c.avg / maxAvg) * 100}%"></div></div>
              <span style="font-size:12px;color:var(--yellow)">${c.avg.toFixed(1)} 💨</span>
            </div>
          </li>`
        ).join('') + '</ul>';
      }
    }

    // ===== HISTORY =====
    function renderHistory() {
      const farts = getFarts();
      const foods = getFoods();

      // Populate food filter
      const foodFilter = document.getElementById('filterFood');
      const uniqueFoods = [...new Set(farts.map(f => f.food).filter(Boolean).map(f => f.toLowerCase()))];
      const currentVal = foodFilter.value;
      foodFilter.innerHTML = '<option value="">All Foods</option>' +
        uniqueFoods.map(f => `<option value="${escHtml(f)}">${escHtml(f)}</option>`).join('');
      foodFilter.value = currentVal;

      // Apply filters
      let filtered = [...farts];
      const dateVal = document.getElementById('filterDate').value;
      if (dateVal) {
        filtered = filtered.filter(f => isoDate(f.timestamp) === dateVal);
      }
      const intVal = document.getElementById('filterIntensity').value;
      if (intVal) {
        filtered = filtered.filter(f => f.intensity === parseInt(intVal));
      }
      const foodVal = document.getElementById('filterFood').value;
      if (foodVal) {
        filtered = filtered.filter(f => f.food && f.food.toLowerCase() === foodVal);
      }

      const list = document.getElementById('historyList');
      if (!filtered.length) {
        list.innerHTML = '<li class="history-empty">No farts match your filters 🔍</li>';
        return;
      }

      list.innerHTML = filtered.slice(0, 50).map(f => {
        const emoji = INTENSITY_EMOJI[f.intensity] || '💨';
        const sound = SOUND_EMOJI[f.sound] || '';
        const details = [
          'Intensity ' + f.intensity + '/5',
          sound + ' ' + (f.sound || ''),
          f.duration || ''
        ].filter(Boolean).join(' · ');
        const foodTag = f.food ? `<div class="h-food">🍔 ${escHtml(f.food)}</div>` : '';
        return `<li class="history-item">
          <span class="emoji">${emoji}</span>
          <div class="h-meta">
            <div class="h-date">${fullDateStr(f.timestamp)}</div>
            <div class="h-details">${details}</div>
            ${foodTag}
          </div>
        </li>`;
      }).join('');
    }

    // History filter listeners
    ['filterDate', 'filterIntensity', 'filterFood'].forEach(id => {
      document.getElementById(id).addEventListener('change', renderHistory);
    });

    // ===== INIT =====
    updateTodayCount();
    renderRecent();

    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
    }
  </script>
</body>
</html>
